<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scarf — SIM-LINE</title>
  <meta name="description" content="Handmade unique scarf by SIM-LINE." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main>
    <div class="container">
      <nav class="breadcrumb" id="crumb">
        <a href="index.html">Home</a><span class="sep">›</span>
        <a href="scarves.html">Scarves</a><span class="sep">›</span>
        <span id="crumbTitle">Loading…</span>
      </nav>
    </div>

    <section class="container">
      <div id="pdpRoot"><div class="text-center" style="padding:6rem 0"><div class="spinner" style="margin:0 auto;color:var(--rose)"></div></div></div>
    </section>

    <section class="container" id="relatedSection" style="display:none">
      <div class="section-header"><h2 class="section-title">You may also love</h2></div>
      <div id="relatedGrid" class="product-grid"></div>
    </section>
  </main>

  <script src="js/shopify.js"></script>
  <script src="js/app.js"></script>
  <script>
    mountChrome('scarves');
    const handle = new URLSearchParams(location.search).get('handle');
    let activeImage = 0, variantIndex = 0, product = null;

    function renderPDP() {
      if (!product) return;
      const variants = product.variants.edges;
      const variant = variants[variantIndex]?.node;
      const images = product.images.edges;
      const img = images[activeImage]?.node;

      document.getElementById('crumbTitle').textContent = product.title;
      document.title = `${product.title} — SIM-LINE`;

      const root = document.getElementById('pdpRoot');
      root.innerHTML = `
        <div class="pdp">
          <div>
            <div class="pdp-image">${img ? `<img src="${img.url}" alt="${img.altText || product.title}">` : ''}</div>
            ${images.length > 1 ? `<div class="pdp-thumbs">${images.map((im, i) => `<button class="${i===activeImage?'active':''}" data-img="${i}"><img src="${im.node.url}" alt=""></button>`).join('')}</div>` : ''}
          </div>
          <div>
            <p class="eyebrow">SIM-LINE</p>
            <h1>${product.title}</h1>
            <p class="price">${variant.price.currencyCode} ${parseFloat(variant.price.amount).toFixed(2)}</p>
            <div class="unique-note">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3l1.9 5.8H20l-4.9 3.6L17 18l-5-3.6L7 18l1.9-5.6L4 8.8h6.1z"/></svg>
              Unique piece — only 1–3 ever made
            </div>
            <p class="description">${product.description || ''}</p>
            ${variants.length > 1 ? `
              <div class="pdp-variants">
                <div class="label">Choose</div>
                <div class="variant-options">
                  ${variants.map((v, i) => `<button class="variant-btn ${i===variantIndex?'active':''}" data-variant="${i}" ${v.node.availableForSale?'':'disabled'}>${v.node.title}</button>`).join('')}
                </div>
              </div>
            ` : ''}
            <div class="pdp-actions">
              <button class="btn btn-primary" id="addBtn" ${variant.availableForSale?'':'disabled'}>${variant.availableForSale ? 'Add to bag' : 'Sold'}</button>
              <button class="btn btn-outline btn-icon" id="wishBtn" aria-label="Wishlist">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              </button>
            </div>
            <div class="pdp-details">
              <h3>Details</h3>
              <dl>
                ${product.options.map(o => `<dt>${o.name}</dt><dd>${o.values.join(', ')}</dd>`).join('')}
                <dt>Care</dt><dd>Hand wash or 30°C in laundry bag</dd>
                <dt>Origin</dt><dd>Handmade in Switzerland</dd>
              </dl>
            </div>
          </div>
        </div>
      `;

      root.querySelectorAll('button[data-img]').forEach(b => b.addEventListener('click', () => { activeImage = +b.dataset.img; renderPDP(); }));
      root.querySelectorAll('button[data-variant]').forEach(b => b.addEventListener('click', () => { variantIndex = +b.dataset.variant; renderPDP(); }));
      root.querySelector('#wishBtn').addEventListener('click', () => toast('Saved to wishlist'));
      root.querySelector('#addBtn').addEventListener('click', async () => {
        const v = product.variants.edges[variantIndex].node;
        await CartStore.addItem({
          product: { title: product.title, handle: product.handle, images: product.images },
          variantId: v.id,
          variantTitle: v.title,
          price: v.price,
          quantity: 1,
          selectedOptions: v.selectedOptions || [],
        });
        openCart();
      });
    }

    if (!handle) {
      document.getElementById('pdpRoot').innerHTML = `<div class="empty-state"><h3>Scarf not found</h3><a class="btn btn-primary" href="scarves.html" style="margin-top:1rem">Back to collection</a></div>`;
    } else {
      fetchProductByHandle(handle).then(p => {
        if (!p) {
          document.getElementById('pdpRoot').innerHTML = `<div class="empty-state"><h3>Scarf not found</h3><a class="btn btn-primary" href="scarves.html" style="margin-top:1rem">Back to collection</a></div>`;
          return;
        }
        product = p;
        renderPDP();
      });
      fetchProducts(8).then(list => {
        const related = (list || []).filter(e => e.node.handle !== handle).slice(0, 4);
        if (related.length) {
          document.getElementById('relatedSection').style.display = 'block';
          document.getElementById('relatedGrid').innerHTML = related.map(productCardHtml).join('');
        }
      });
    }
  </script>
</body>
</html>
